apiVersion: v1
kind: ConfigMap
metadata:
  name: tak-import-cert-script
  namespace: tak-server
data:
  import-cert.sh: |
    #!/bin/bash
    # TAKServer Client Certificate Importer for macOS
    # Run this on your Mac after copying it from the TAKServer node.
    # Usage: ./import-cert.sh [node-ip]

    set -e

    TAK_NODE="$${1:-$${TAK_NODE:-$(hostname -I 2>/dev/null | awk '{print $1}')}}"
    TAK_USER="$${TAK_USER:-packet}"
    CERT_PASSWORD="$${CERT_PASSWORD:-atakatak}"
    CERT_PATH="/home/$${TAK_USER}/tak-client-cert/user.p12"
    DASHBOARD_PORT="$${DASHBOARD_PORT:-32355}"

    RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[1;33m'; NC='\033[0m'
    info()  { echo -e "$${GREEN}[INFO]$${NC} $1"; }
    warn()  { echo -e "$${YELLOW}[WARN]$${NC} $1"; }
    error() { echo -e "$${RED}[ERROR]$${NC} $1"; exit 1; }

    command -v openssl >/dev/null 2>&1 || error "openssl is required"
    command -v security >/dev/null 2>&1 || error "macOS security command not found — this script is for macOS only"

    TMPDIR_WORK=$(mktemp -d)
    trap "rm -rf $TMPDIR_WORK" EXIT

    RAW_P12="$TMPDIR_WORK/user_raw.p12"
    LEGACY_P12="$TMPDIR_WORK/user_legacy.p12"
    PEM_FILE="$TMPDIR_WORK/user_all.pem"
    LOCAL_P12="$HOME/user.p12"

    info "Downloading client certificate from $TAK_USER@$TAK_NODE..."
    ssh -o StrictHostKeyChecking=no "$TAK_USER@$TAK_NODE" "cat $CERT_PATH" > "$RAW_P12" \
        || error "Failed to download cert. Check SSH access."
    info "Certificate downloaded ($(wc -c < "$RAW_P12" | tr -d ' ') bytes)"

    info "Converting to macOS-compatible PKCS#12 format..."
    LEGACY_FLAG=""
    openssl pkcs12 -help 2>&1 | grep -q '\-legacy' && LEGACY_FLAG="-legacy"

    openssl pkcs12 -in "$RAW_P12" -out "$PEM_FILE" -nodes -passin "pass:$CERT_PASSWORD" $LEGACY_FLAG 2>/dev/null \
        || error "Failed to extract certificate. Wrong password?"
    openssl pkcs12 -export -in "$PEM_FILE" -out "$LEGACY_P12" -passout "pass:$CERT_PASSWORD" $LEGACY_FLAG 2>/dev/null \
        || error "Failed to re-export in legacy format."

    info "Importing into macOS login keychain..."
    security import "$LEGACY_P12" \
        -k ~/Library/Keychains/login.keychain-db \
        -P "$CERT_PASSWORD" \
        -T /Applications/Safari.app \
        -T "/Applications/Google Chrome.app" \
        -T /usr/bin/curl 2>&1 || error "Keychain import failed."

    cp "$LEGACY_P12" "$LOCAL_P12"
    info "Local copy saved to $LOCAL_P12"

    CA_PEM="$TMPDIR_WORK/ca.pem"
    openssl pkcs12 -in "$LEGACY_P12" -cacerts -nokeys -out "$CA_PEM" -passin "pass:$CERT_PASSWORD" $LEGACY_FLAG 2>/dev/null
    if [ -s "$CA_PEM" ]; then
        warn "Trusting CA certificate (will prompt for macOS password)..."
        security add-trusted-cert -r trustAsRoot -k ~/Library/Keychains/login.keychain-db "$CA_PEM" 2>/dev/null \
            && info "CA certificate trusted" \
            || warn "CA trust failed — you'll see browser TLS warnings (safe to ignore)"
    fi

    echo ""
    echo -e "$${GREEN}=== Setup Complete ===$${NC}"
    echo "  Dashboard: https://$TAK_NODE:$DASHBOARD_PORT"
    echo "  Cert file: $LOCAL_P12"
    echo "  Password:  $CERT_PASSWORD"
    echo "  Open the URL in Safari or Chrome and select the 'user' certificate."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tak-cert-export
  namespace: tak-server
  labels:
    app: takserver
    component: cert-export
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: takserver
        component: cert-export
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cert-export
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              CERT_SRC=/certs
              SCRIPT_SRC=/scripts/import-cert.sh
              DEST=/user-home/tak-client-cert

              echo "Waiting for certificates to be generated..."
              TRIES=0
              while [ ! -f "$CERT_SRC/user.p12" ] || [ ! -f "$CERT_SRC/takserver.jks" ]; do
                TRIES=$((TRIES + 1))
                if [ $TRIES -gt 60 ]; then
                  echo "ERROR: Timed out waiting for certs after 300s"
                  exit 1
                fi
                sleep 5
              done
              echo "Certificates found."

              echo "Copying cert and import script to user home directory..."
              mkdir -p "$DEST"
              cp "$CERT_SRC/user.p12" "$DEST/user.p12"
              cp "$SCRIPT_SRC" "$DEST/import-cert.sh"
              chmod 644 "$DEST/user.p12"
              chmod 755 "$DEST/import-cert.sh"

              echo ""
              echo "=== Files exported to user home ==="
              ls -la "$DEST/"
              echo ""
              echo "From your Mac, run:"
              echo "  scp <user>@<node-ip>:~/tak-client-cert/import-cert.sh ."
              echo "  scp <user>@<node-ip>:~/tak-client-cert/user.p12 ."
              echo "  ./import-cert.sh <node-ip>"
          volumeMounts:
            - name: tak-certs
              mountPath: /certs
              readOnly: true
            - name: import-script
              mountPath: /scripts
            - name: user-home
              mountPath: /user-home
      volumes:
        - name: tak-certs
          hostPath:
            path: /var/lib/tak-server/certs
            type: DirectoryOrCreate
        - name: import-script
          configMap:
            name: tak-import-cert-script
            defaultMode: 0755
        - name: user-home
          hostPath:
            path: /home/packet
            type: Directory
