apiVersion: batch/v1
kind: Job
metadata:
  name: tak-cert-init
  namespace: tak-server
  labels:
    app: takserver
    component: cert-init
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: takserver
        component: cert-init
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: cert-gen
          image: ${ARC_ACR_LOGIN_SERVER}/takserver:5.5-RELEASE-45
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -e
              CERT_DIR=/opt/tak/certs
              FILES_DIR=$CERT_DIR/files

              # Skip if certs already exist
              if [ -f "$FILES_DIR/takserver.jks" ] && [ -f "$FILES_DIR/truststore-root.jks" ]; then
                echo "Certificates already exist — skipping generation."
                ls -la $FILES_DIR/
                exit 0
              fi

              echo "=== Configuring cert metadata ==="
              cd $CERT_DIR
              sed -i 's/^COUNTRY=.*/COUNTRY=US/' cert-metadata.sh
              sed -i 's/^STATE=.*/STATE=VA/' cert-metadata.sh
              sed -i 's/^CITY=.*/CITY=Chantilly/' cert-metadata.sh
              sed -i 's/^ORGANIZATION=.*/ORGANIZATION=Domenix/' cert-metadata.sh
              sed -i 's/^ORGANIZATIONAL_UNIT=.*/ORGANIZATIONAL_UNIT=TAK/' cert-metadata.sh
              sed -i 's/^CAPASS=.*/CAPASS=atakatak/' cert-metadata.sh

              echo "=== Generating Root CA ==="
              ./makeRootCa.sh

              echo "=== Generating Server Certificate ==="
              ./makeCert.sh server takserver

              echo "=== Generating Client Certificate ==="
              ./makeCert.sh client user

              echo "=== Certificates generated ==="
              ls -la $FILES_DIR/
              echo "=== TAKServer cert init complete ==="
              echo "NOTE: Restart the takserver deployment to pick up certs,"
              echo "then run: kubectl exec -n tak-server deployment/takserver -- java -jar /opt/tak/utils/UserManager.jar certmod -A /opt/tak/certs/files/user.pem"
          volumeMounts:
            - name: tak-certs
              mountPath: /opt/tak/certs/files
      volumes:
        - name: tak-certs
          hostPath:
            path: /var/lib/tak-server/certs
            type: DirectoryOrCreate
