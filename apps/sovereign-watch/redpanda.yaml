apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sovereign-watch-redpanda
  namespace: sovereign-watch
spec:
  serviceName: sovereign-watch-redpanda
  replicas: 1
  selector:
    matchLabels:
      app: sovereign-watch
      component: redpanda
  template:
    metadata:
      labels:
        app: sovereign-watch
        component: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v23.3.18
          command:
            - rpk
            - redpanda
            - start
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 8082
              name: pandaproxy
            - containerPort: 8081
              name: schema-reg
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
            - name: config
              mountPath: /etc/redpanda
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
          readinessProbe:
            exec:
              command: ["rpk", "cluster", "health"]
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["rpk", "cluster", "health"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          hostPath:
            path: /var/lib/sovereign-watch/redpanda
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: sovereign-watch-redpanda-config
---
apiVersion: v1
kind: Service
metadata:
  name: sovereign-watch-redpanda
  namespace: sovereign-watch
spec:
  clusterIP: None
  selector:
    app: sovereign-watch
    component: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: pandaproxy
      port: 8082
      targetPort: 8082
    - name: schema-reg
      port: 8081
      targetPort: 8081
