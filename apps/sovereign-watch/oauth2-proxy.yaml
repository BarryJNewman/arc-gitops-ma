apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereign-watch-oauth2-proxy
  namespace: sovereign-watch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sovereign-watch
      component: oauth2-proxy
  template:
    metadata:
      labels:
        app: sovereign-watch
        component: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:latest
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://login.microsoftonline.us/${ARC_TENANT_ID}/v2.0
            - --oidc-email-claim=preferred_username
            - --http-address=0.0.0.0:4180
            - --upstream=http://sovereign-watch-frontend:80
            - --redirect-url=https://sovereign.darkoverlay.com/oauth2/callback
            - --email-domain=*
            - --scope=openid profile email User.Read
            - --cookie-domain=.darkoverlay.com
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --pass-authorization-header=true
            - --set-authorization-header=true
            - --pass-user-headers=true
            - --skip-provider-button=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sovereign-watch-entra
                  key: CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sovereign-watch-entra
                  key: CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: sovereign-watch-entra
                  key: COOKIE_SECRET
          ports:
            - containerPort: 4180
          volumeMounts:
            - name: akv-secrets
              mountPath: /mnt/akv-secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 15
      volumes:
        - name: akv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: akv-sovereign-watch
            nodePublishSecretRef:
              name: secrets-store-creds
---
apiVersion: v1
kind: Service
metadata:
  name: sovereign-watch-oauth2-proxy
  namespace: sovereign-watch
spec:
  selector:
    app: sovereign-watch
    component: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
