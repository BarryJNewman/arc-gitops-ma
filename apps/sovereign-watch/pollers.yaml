---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereign-watch-ais-poller
  namespace: sovereign-watch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sovereign-watch
      component: ais-poller
  template:
    metadata:
      labels:
        app: sovereign-watch
        component: ais-poller
    spec:
      containers:
        - name: ais-poller
          image: ${ARC_ACR_LOGIN_SERVER}/sovereign-watch-ais-poller:latest
          imagePullPolicy: Always
          env:
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sovereign-watch-poller-secrets
                  key: AISSTREAM_API_KEY
                  optional: true
            - name: KAFKA_BROKERS
              value: "sovereign-watch-redpanda:9092"
            - name: REDIS_HOST
              value: "sovereign-watch-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: CENTER_LAT
              value: "45.5152"
            - name: CENTER_LON
              value: "-122.6784"
            - name: COVERAGE_RADIUS_NM
              value: "150"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      imagePullSecrets:
        - name: acr-pull-secret
---
