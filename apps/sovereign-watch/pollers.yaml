---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereign-watch-space-pulse
  namespace: sovereign-watch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sovereign-watch
      component: space-pulse
  template:
    metadata:
      labels:
        app: sovereign-watch
        component: space-pulse
    spec:
      containers:
        - name: space-pulse
          image: ${ARC_ACR_LOGIN_SERVER}/sovereign-watch-space-pulse:latest
          imagePullPolicy: Always
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sovereign-watch-secrets
                  key: POSTGRES_PASSWORD
            - name: KAFKA_BROKERS
              value: "sovereign-watch-redpanda:9092"
            - name: REDIS_HOST
              value: "sovereign-watch-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@sovereign-watch-db:5432/sovereign_watch"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      imagePullSecrets:
        - name: acr-pull-secret
