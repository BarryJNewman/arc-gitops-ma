apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereign-watch-backend
  namespace: sovereign-watch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sovereign-watch
      component: backend
  template:
    metadata:
      labels:
        app: sovereign-watch
        component: backend
    spec:
      containers:
        - name: backend
          image: ${ARC_ACR_LOGIN_SERVER}/sovereign-watch-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sovereign-watch-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_DSN
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@sovereign-watch-db:5432/sovereign_watch"
            - name: KAFKA_BROKERS
              value: "sovereign-watch-redpanda:9092"
            - name: REDIS_URL
              value: "redis://sovereign-watch-redis:6379"
            - name: CENTER_LAT
              value: "45.5152"
            - name: CENTER_LON
              value: "-122.6784"
            - name: COVERAGE_RADIUS_NM
              value: "150"
            - name: ALLOWED_ORIGINS
              value: "https://sovereign.darkoverlay.com"
            - name: LITELLM_MODEL
              value: "secure-core"
            - name: OPEN_API_BASE
              value: "http://litellm.litellm.svc.cluster.local:4000/v1"
          volumeMounts:
            - name: akv-secrets
              mountPath: /mnt/akv-secrets
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 30
      imagePullSecrets:
        - name: acr-pull-secret
      volumes:
        - name: akv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: akv-sovereign-watch
            nodePublishSecretRef:
              name: secrets-store-creds
---
apiVersion: v1
kind: Service
metadata:
  name: sovereign-watch-backend
  namespace: sovereign-watch
spec:
  selector:
    app: sovereign-watch
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
