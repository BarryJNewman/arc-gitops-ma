apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sovereign-watch-oauth2
  namespace: sovereign-watch
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sovereign.darkoverlay.com
      secretName: darkoverlay-tls
  rules:
    - host: sovereign.darkoverlay.com
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: sovereign-watch-oauth2-proxy
                port:
                  number: 4180
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sovereign-watch
  namespace: sovereign-watch
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/auth-url: "http://sovereign-watch-oauth2-proxy.sovereign-watch.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://sovereign.darkoverlay.com/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Access-Token"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sovereign.darkoverlay.com
      secretName: darkoverlay-tls
  rules:
    - host: sovereign.darkoverlay.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sovereign-watch-backend
                port:
                  number: 8000
          - path: /js8
            pathType: Prefix
            backend:
              service:
                name: sovereign-watch-js8call
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sovereign-watch-frontend
                port:
                  number: 80
