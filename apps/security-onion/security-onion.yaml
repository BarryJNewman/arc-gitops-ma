---
# DataVolume: Downloads Security Onion 2.4.210 ISO via CDI
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: securityonion-iso
  namespace: security-onion
spec:
  source:
    http:
      url: "https://download.securityonion.net/file/securityonion/securityonion-2.4.210-20260302.iso"
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 16Gi
---
# DataVolume: Empty disk for Security Onion OS installation
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: securityonion-disk
  namespace: security-onion
spec:
  source:
    blank: {}
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 200Gi
---
# VirtualMachine: Security Onion 2.4 — Network Security Monitoring
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: securityonion
  namespace: security-onion
  labels:
    app: security-onion
spec:
  running: true
  template:
    metadata:
      labels:
        app: security-onion
        kubevirt.io/domain: securityonion
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        memory:
          guest: 16Gi
        machine:
          type: q35
        devices:
          disks:
            - name: securityonion-disk
              disk:
                bus: virtio
              bootOrder: 1
            - name: securityonion-iso
              cdrom:
                bus: sata
              bootOrder: 2
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: securityonion-disk
          dataVolume:
            name: securityonion-disk
        - name: securityonion-iso
          dataVolume:
            name: securityonion-iso
      terminationGracePeriodSeconds: 60
---
# Service: Security Onion web UI (SOC console) via NodePort
apiVersion: v1
kind: Service
metadata:
  name: securityonion-web
  namespace: security-onion
spec:
  type: NodePort
  selector:
    kubevirt.io/domain: securityonion
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
