---
# PVs for Windows DC KubeVirt DataVolumes
# Sizes include ~10% headroom for CDI overhead on import
# Each CDI import creates a data PVC + scratch PVC of equal size
# claimRef ensures deterministic binding (no random PV assignment)
# hostPath directories created by rke2-arc-setup.sh at first boot
# nodeAffinity uses kubernetes.io/os=linux (works on any Linux node)
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: windows-iso-pv
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  claimRef:
    name: windows-iso
    namespace: windows-dc
  local:
    path: /opt/kubevirt-storage/windows-iso
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/os
              operator: In
              values: ["linux"]
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: windows-iso-scratch-pv
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  claimRef:
    name: windows-iso-scratch
    namespace: windows-dc
  local:
    path: /opt/kubevirt-storage/windows-iso-scratch
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/os
              operator: In
              values: ["linux"]
---
