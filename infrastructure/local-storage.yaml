---
# StorageClass: local-storage using no-provisioner
# PVs are pre-created by rke2-arc-setup.sh on first boot.
# Works on both physical bare metal and Proxmox VMs.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: kubernetes.io/no-provisioner
reclaimPolicy: Retain
volumeBindingMode: Immediate
